<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ user.name }} - Profile Card</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="profile-card">
            <div class="card-header">
                <img src="{{ user.image_url }}" alt="{{ user.name }}'s avatar" class="profile-img" onerror="this.src='https://ui-avatars.com/api/?name={{ user.name | urlencode }}&background=0D8ABC&color=fff&size=120'">
            </div>
            <div class="card-body">
                <h2 class="profile-name">{{ user.name }}</h2>
                <p class="profile-bio">{{ user.bio }}</p>
                <a href="/" class="back-link">Create Another</a>
            </div>
        </div>
    </div>
</body>
</html>
